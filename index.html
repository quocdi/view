<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Strict Control Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .wrapper-box {
            position: absolute !important;
            pointer-events: auto !important;
            touch-action: none;
            will-change: transform;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .tournament-box {
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.95) 0%, rgba(10, 10, 10, 0.98) 100%);
            border-radius: 20px; 
            border: 2px solid #D4AF37; 
            color: #FFD700;
            font-weight: 800;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            cursor: move;
            width: 100%;
            height: 100%;
            padding: 8px 20px;
            word-break: break-word;
        }

        .player {
            border-radius: 15px;
            font-weight: 700;
            font-size: 26px;
            color: #fff;
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: move;
            width: 100%;
            min-height: 100%;
            padding: 5px 15px;
            white-space: normal; 
            word-break: break-word; 
            overflow: visible; 
        }

        .red { background: linear-gradient(135deg, #e60000 0%, #800000 100%); }
        .blue { background: linear-gradient(135deg, #0055ff 0%, #002266 100%); }

        .resizer {
            width: 16px;
            height: 16px;
            background: #fff;
            border: 2px solid #333;
            border-radius: 50%;
            position: absolute;
            right: -6px;
            bottom: -6px;
            cursor: nwse-resize;
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .tournament-box + .resizer { background: #FFD700; }

        /* VỊ TRÍ GỐC CỐ ĐỊNH */
        #wrapTour { top: 0; left: 0; width: 350px; min-height: 50px; }
        #wrapRed { top: 0; left: 0; width: 220px; min-height: 60px; }
        #wrapBlue { top: 0; left: 0; width: 220px; min-height: 60px; }

        /* PANEL ĐIỀU KHIỂN */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98);
            padding: 18px 30px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        input {
            background: #1a1a1a;
            color: white;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 10px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus { border-color: #00c853; background: #222; }
        #inTour { width: 280px; border-color: #D4AF37; }
        #inRed, #inBlue { width: 160px; }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            text-transform: uppercase;
        }

        .btn-update { background: #00c853; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3); }
        .btn-update:hover { background: #00e676; transform: translateY(-2px); }

        #fsBtn {
            background: #4D80F5;
            position: fixed !important;
            bottom: 25px;
            left: 25px;
            z-index: 110;
        }

        .fs-active-style {
            background: rgba(0,0,0,0.5) !important;
            color: #fff !important;
            bottom: 15px !important;
            left: 15px !important;
            padding: 8px 12px !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        @media (max-width: 768px) {
            .control-panel { flex-direction: column; width: 92%; bottom: 15px; padding: 15px; }
            #inTour, #inRed, #inBlue { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="main-stream" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay-container">
        <div class="wrapper-box" id="wrapTour">
            <div class="tournament-box" id="dispTour">GIẢI ĐẤU CỜ TƯỚNG</div>
            <div class="resizer"></div>
        </div>
        
        <div class="wrapper-box" id="wrapRed">
            <div class="player red" id="dispRed">TIÊN</div>
            <div class="resizer"></div>
        </div>
        
        <div class="wrapper-box" id="wrapBlue">
            <div class="player blue" id="dispBlue">HẬU</div>
            <div class="resizer"></div>
        </div>
    </div>

    <div class="control-panel" id="panel">
        <input id="inTour" placeholder="Tên Giải Đấu">
        <input id="inRed" placeholder="Tên Bên Đỏ (Tiên)">
        <input id="inBlue" placeholder="Tên Bên Xanh (Hậu)">
        <button class="btn btn-update" onclick="applyInfo()">CẬP NHẬT</button>
    </div>

    <button class="btn" id="fsBtn">FULL</button>

    <script>
        const secureLink = atob("aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9cXVvY2RhbmcmY2xlYW5vdXRwdXQmbm9hdWRpbyZidWZmZXI9MCZidXR0b25zPTA=");
        const iframe = document.getElementById("main-stream");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        // Quản lý dữ liệu bộ nhớ vị trí gốc
        const state = {
            wrapTour: { x: window.innerWidth/2 - 175, y: 10, w: 350, h: 50 },
            wrapRed: { x: 80, y: 75, w: 220, h: 60 },
            wrapBlue: { x: window.innerWidth - 300, y: 75, w: 220, h: 60 }
        };

        if (window.innerWidth <= 768) {
            state.wrapTour = { x: window.innerWidth/2 - 90, y: 5, w: 180, h: 32 };
            state.wrapRed = { x: 10, y: 45, w: 110, h: 35 };
            state.wrapBlue = { x: window.innerWidth - 120, y: 45, w: 110, h: 35 };
        }

        const u = new URLSearchParams(window.location.search);
        const hasTour = u.get("g");
        const hasRed = u.get("d");
        const hasBlue = u.get("x");
        const posData = u.get("pos");

        document.getElementById("dispTour").innerText = hasTour || "GIẢI ĐẤU CỜ TƯỚNG";
        document.getElementById("dispRed").innerText = hasRed || "TIÊN";
        document.getElementById("dispBlue").innerText = hasBlue || "HẬU";

        iframe.src = secureLink;

        if (u.get("live") === "1") {
            panel.style.display = "none";
            btnFs.style.display = "none";
            document.querySelectorAll('.resizer').forEach(r => r.style.display = 'none');
        }

        if (posData) {
            try {
                const parsed = JSON.parse(decodeURIComponent(posData));
                Object.keys(parsed).forEach(id => {
                    if (state[id]) {
                        state[id].x = parsed[id].x;
                        state[id].y = parsed[id].y;
                        state[id].w = parsed[id].w;
                        state[id].h = parsed[id].h;
                    }
                });
            } catch(e) { console.log("Lỗi đọc vị trí"); }
        }

        function renderBox(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.transform = `translate3d(${state[id].x}px, ${state[id].y}px, 0)`;
            el.style.width = state[id].w + 'px';
            el.style.minHeight = state[id].h + 'px';
            autoFitText(el);
        }

        function renderAll() {
            Object.keys(state).forEach(id => renderBox(id));
        }

        function autoFitText(box) {
            const innerTextNode = box.querySelector('.player, .tournament-box');
            if(!innerTextNode) return;
            let currentHeight = box.clientHeight || state[box.id].h;
            let calculatedFont = Math.floor(currentHeight * 0.42);
            innerTextNode.style.fontSize = calculatedFont + "px";

            let maxLoop = 40;
            while ((innerTextNode.scrollHeight > box.clientHeight || innerTextNode.scrollWidth > box.clientWidth) && calculatedFont > 9 && maxLoop > 0) {
                calculatedFont--;
                innerTextNode.style.fontSize = calculatedFont + "px";
                maxLoop--;
            }
        }

        function applyInfo() {
            document.getElementById("dispTour").innerText = document.getElementById("inTour").value.trim() || "GIẢI ĐẤU CỜ TƯỚNG";
            document.getElementById("dispRed").innerText = document.getElementById("inRed").value.trim() || "TIÊN";
            document.getElementById("dispBlue").innerText = document.getElementById("inBlue").value.trim() || "HẬU";
            
            renderAll();

            const tourStr = encodeURIComponent(document.getElementById("dispTour").innerText);
            const redStr = encodeURIComponent(document.getElementById("dispRed").innerText);
            const blueStr = encodeURIComponent(document.getElementById("dispBlue").innerText);
            const posStr = encodeURIComponent(JSON.stringify(state));

            const newU = `?g=${tourStr}&d=${redStr}&x=${blueStr}&pos=${posStr}`;
            window.history.pushState({}, '', newU);
        }

        window.addEventListener('load', () => { renderAll(); setTimeout(renderAll, 300); });
        window.addEventListener('resize', () => { renderAll(); });

        btnFs.addEventListener("click", async () => {
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
                btnFs.innerText = "✕";
                btnFs.classList.add("fs-active-style");
                panel.style.opacity = "0";
                panel.style.visibility = "hidden";
            } else { await document.exitFullscreen(); }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.classList.remove("fs-active-style");
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
            setTimeout(renderAll, 150);
        });

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') applyInfo(); });

        // 🔥 ĐÃ SỬA: CHỈ KÍCH HOẠT KÉO KHI CLICK ĐÚNG VÀO Ô, KHÔNG LẮNG NGHE ĐẠI TRÀ
        let activeId = null, isDragging = false, isResizing = false;
        let startX, startY, baseX, baseY, baseW, baseH, ticking = false;

        function updateTransform() {
            if (!activeId) { ticking = false; return; }
            renderBox(activeId);
            ticking = false;
        }

        const onStart = (e) => {
            // Tìm chính xác wrapper-box mục tiêu
            const box = e.target.closest('.wrapper-box');
            if (!box) return; // Nếu nhấn trúng input hoặc khoảng không -> Bỏ qua ngay lập tức!

            activeId = box.id;
            const resizer = box.querySelector('.resizer');

            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            
            startX = clientX;
            startY = clientY;

            baseX = state[activeId].x;
            baseY = state[activeId].y;
            baseW = state[activeId].w;
            baseH = state[activeId].h;

            if (e.target === resizer) {
                isResizing = true;
                isDragging = false;
            } else {
                isDragging = true;
                isResizing = false;
            }
        };

        const onMove = (e) => {
            if (!isDragging && !isResizing) return;
            if (e.cancelable) e.preventDefault();

            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            
            const dx = clientX - startX;
            const dy = clientY - startY;

            if (isDragging) {
                state[activeId].x = baseX + dx;
                state[activeId].y = baseY + dy;
            } else if (isResizing) {
                state[activeId].w = Math.max(70, baseW + dx);
                state[activeId].h = Math.max(25, baseH + dy);
            }

            if (!ticking) {
                requestAnimationFrame(updateTransform);
                ticking = true;
            }
        };

        const onEnd = () => {
            isDragging = false;
            isResizing = false;
            activeId = null;
        };

        // Gắn sự kiện mousedown/touchstart TRỰC TIẾP vào các ô để bắt chuẩn xác
        document.querySelectorAll('.wrapper-box').forEach(box => {
            box.addEventListener('mousedown', onStart);
            box.addEventListener('touchstart', onStart, { passive: false });
        });

        // Sự kiện move và end vẫn bắt ở window để tránh bị tuột tay khi di nhanh
        window.addEventListener('mousemove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onEnd);

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
