<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cờ Tướng</title>

<style>
body {
  margin:0;
  background:black;
  font-family:Arial;
}

/* VIDEO */
iframe {
  position:fixed;
  width:100%;
  height:100%;
  border:none;
}

.overlay {
  position: fixed;
  top: 20px;
  left: 0;
  width: 100%;
  height: 0;
  z-index: 10;
  pointer-events: none;
}

/* STYLE CHUNG */
.player {
  position: absolute;
  padding: 12px 28px;
  border-radius: 12px;
  color: #fff;
  font-weight: bold;
  font-size: 20px;
  letter-spacing: 1px;
  border: 2px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.6);
}

/* 🔴 BÊN TRÁI */
.red {
  left: 80px;
  background: linear-gradient(135deg, #ff1a1a, #800000);
}

/* 🔵 BÊN PHẢI */
.blue {
  right: 80px;
  background: linear-gradient(135deg, #1a75ff, #002b80);
}
/* PANEL */
.panel {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  z-index:20;
}

input {
  padding:6px;
  border:none;
  border-radius:5px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay">
  <div class="player red" id="name1">Đỏ</div>
  <div class="player blue" id="name2">Xanh</div>
</div>

<!-- VIDEO -->
<iframe src="https://vdo.ninja/?view=quocdang&cleanoutput&noaudio&buffer=0"></iframe>

<!-- PANEL -->
<div class="panel" id="panel">
  <input id="input1" placeholder="Tên đỏ">
  <input id="input2" placeholder="Tên xanh">
  <button onclick="update()">Cập nhật</button>
</div>

<script>
// Ẩn panel khi live
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("live") === "1") {
  document.getElementById("panel").style.display = "none";
}

// Load lại dữ liệu
window.onload = () => {
  if(localStorage.name1) name1.innerText = localStorage.name1;
  if(localStorage.name2) name2.innerText = localStorage.name2;
};

// Update tên
function update() {
  const n1 = input1.value;
  const n2 = input2.value;

  if(n1){
    name1.innerText = n1;
    localStorage.name1 = n1;
  }
  if(n2){
    name2.innerText = n2;
    localStorage.name2 = n2;
  }
}
</script>

</body>
</html>
