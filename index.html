<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* OVERLAY TÊN PLAYER */
        .overlay {
            position: fixed;
            top: 20px;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }

        .player {
            min-width: 100px;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .red { background: rgba(255, 42, 42, 0.8); }
        .blue { background: rgba(42, 123, 255, 0.8); }

        /* PANEL ĐIỀU KHIỂN CHO MOBILE */
        .panel {
            position: fixed;
            bottom: 10px; left: 10px; right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            border: 1px solid #444;
        }

        input { 
            background: #222; color: white; padding: 12px; 
            border: 1px solid #444; border-radius: 6px; outline: none; width: 100%;
        }
        
        .btn-action { 
            padding: 12px; border: none; border-radius: 6px; 
            background: #00c853; color: white; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div class="panel" id="panel">
        <input id="inputTournament" placeholder="Tên giải đấu">
        <div style="display: flex; gap: 8px;">
            <input id="input1" placeholder="Tên Đỏ">
            <input id="input2" placeholder="Tên Xanh">
        </div>
        <button class="btn-action" onclick="updateInfo()">Cập nhật thông tin</button>
    </div>

    <script>
        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        const iframe = document.getElementById("stream-iframe");
        iframe.src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0`;

        const params = new URLSearchParams(window.location.search);
        document.getElementById("name1").innerText = params.get("d") || "Tiên";
        document.getElementById("name2").innerText = params.get("x") || "Hậu";

        function updateInfo() {
            const tournament = document.getElementById("inputTournament").value.trim();
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";
            
            document.getElementById("name1").innerText = n1;
            document.getElementById("name2").innerText = n2;
            
            // Cập nhật URL để lưu trạng thái
            const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}&t=${encodeURIComponent(tournament)}`;
            window.history.pushState({}, '', newURL);
        }

        // Tự ẩn nếu đã có data (để làm sạch màn hình khi live)
        if (params.get("d") || params.get("x")) {
            document.getElementById("panel").style.display = "none";
        }
    </script>
</body>
</html>
