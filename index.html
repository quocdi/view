<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cờ Tướng</title>

<style>
body {
  margin:0;
  background:black;
  font-family:Arial;
}

/* Video */
iframe {
  position:fixed;
  width:100%;
  height:100%;
  border:none;
}

/* Overlay */
.overlay {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  font-size:20px;
  font-weight:bold;
  z-index:10;
}

.player {
  padding:8px 16px;
  border-radius:8px;
  color:#fff;
}

.red { background:red; }
.blue { background:blue; }

.score {
  background:black;
  padding:8px 16px;
  border-radius:8px;
  border:2px solid white;
}

/* Control panel */
.panel {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  z-index:20;
}

input {
  padding:6px;
  border:none;
  border-radius:5px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
}
</style>
</head>

<body>

<!-- Overlay -->
<div class="overlay">
  <div class="player red" id="name1">Đỏ</div>
  <div class="score" id="score">0 - 0</div>
  <div class="player blue" id="name2">Xanh</div>
</div>

<!-- Video -->
<iframe src="https://vdo.ninja/?view=quocdang&cleanoutput&noaudio&buffer=0"></iframe>

<!-- Panel điều khiển -->
<div class="panel">
  <input id="input1" placeholder="Tên đỏ">
  <input id="input2" placeholder="Tên xanh">
  <input id="scoreInput" placeholder="Tỉ số (vd 1-0)">
  <button onclick="update()">Cập nhật</button>
</div>

<script>
// Load từ localStorage (giữ trạng thái)
window.onload = () => {
  if(localStorage.name1) name1.innerText = localStorage.name1;
  if(localStorage.name2) name2.innerText = localStorage.name2;
  if(localStorage.score) score.innerText = localStorage.score;
};

function update() {
  const n1 = input1.value;
  const n2 = input2.value;
  const sc = scoreInput.value;

  if(n1){
    name1.innerText = n1;
    localStorage.name1 = n1;
  }
  if(n2){
    name2.innerText = n2;
    localStorage.name2 = n2;
  }
  if(sc){
    score.innerText = sc;
    localStorage.score = sc;
  }
}
</script>

</body>
</html>
