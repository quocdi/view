<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cờ Tướng</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; background:black; font-family:Arial; }

iframe {
  position:fixed;
  width:100%;
  height:100%;
  border:none;
}

/* overlay pro */
.overlay {
  position:fixed;
  top:20px;
  width:100%;
}

.player {
  position:absolute;
  padding:12px 28px;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:20px;
  border:2px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  box-shadow:0 6px 15px rgba(0,0,0,0.6);
}

.red {
  left:80px;
  background: linear-gradient(135deg, #ff1a1a, #800000);
}

.blue {
  right:80px;
  background: linear-gradient(135deg, #1a75ff, #002b80);
}

/* panel */
.panel {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  z-index:20;
}

input { padding:6px; border-radius:5px; border:none; }

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
}
</style>
</head>

<body>

<!-- overlay -->
<div class="overlay">
  <div class="player red" id="name1">Đỏ</div>
  <div class="player blue" id="name2">Xanh</div>
</div>

<!-- video -->
<iframe src="https://vdo.ninja/?view=quocdang&cleanoutput&noaudio&buffer=0"></iframe>

<!-- panel -->
<div class="panel" id="panel">
  <input id="input1" placeholder="Tên đỏ">
  <input id="input2" placeholder="Tên xanh">
  <button onclick="update()">Cập nhật</button>
</div>

<script>
// 🔥 CONFIG CỦA BẠN (đã gắn)
const firebaseConfig = {
  apiKey: "AIzaSyCm62HBdHOtdlBxXqhV6aMtznDQOykShjQ",
  authDomain: "quocdang1-7e50b.firebaseapp.com",
  databaseURL: "https://quocdang1-7e50b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "quocdang1-7e50b",
  storageBucket: "quocdang1-7e50b.firebasestorage.app",
  messagingSenderId: "30464017854",
  appId: "1:30464017854:web:37d3193bf65aacb4aee5ef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 realtime listener
db.ref("live").on("value", (snap) => {
  const data = snap.val();
  if (!data) return;

  if (data.red) document.getElementById("name1").innerText = data.red;
  if (data.blue) document.getElementById("name2").innerText = data.blue;
});

// update từ panel
function update() {
  const red = document.getElementById("input1").value;
  const blue = document.getElementById("input2").value;

  db.ref("live").set({
    red: red,
    blue: blue
  });
}

// ẩn panel khi live
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("live") === "1") {
  document.getElementById("panel").style.display = "none";
}
</script>

</body>
</html>
