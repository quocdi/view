<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Ultra Pro Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .draggable {
            position: absolute !important;
            pointer-events: auto !important; 
            cursor: move !important;
            touch-action: none;
            will-change: transform;
        }

        /* 🔥 Ô GIẢI ĐẤU SIÊU CẤP MỚI */
        .tournament-box {
            top: 0;
            left: calc(50% - 175px); 
            width: 350px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.95) 0%, rgba(10, 10, 10, 0.98) 100%);
            padding: 10px 20px;
            
            /* Bo tròn kiểu hiện đại */
            border-radius: 0 0 30px 30px; 
            
            /* Viền vàng Gold ánh kim */
            border: 2px solid #D4AF37; 
            border-top: none;
            
            color: #FFD700;
            font-weight: 800;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-word; 
            letter-spacing: 1px;
            text-transform: uppercase;
            
            /* Đổ bóng sâu và hiệu ứng phát sáng nhẹ xung quanh viền */
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 -2px 10px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(15px);
        }

        #dispRed { top: 75px; left: 80px; }
        #dispBlue { top: 75px; right: 80px; }

        .player {
            width: 220px;
            padding: 14px 20px;
            border-radius: 15px; /* Bo tròn ô tên player đồng bộ luôn */
            font-weight: 700;
            font-size: 26px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .red { background: linear-gradient(135deg, #e60000 0%, #800000 100%); }
        .blue { background: linear-gradient(135deg, #0055ff 0%, #002266 100%); }

        /* PANEL ĐIỀU KHIỂN */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98);
            padding: 18px 30px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        input {
            background: #1a1a1a;
            color: white;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 10px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus { border-color: #00c853; background: #222; }
        #inTour { width: 280px; border-color: #D4AF37; }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            text-transform: uppercase;
        }

        .btn-update { background: #00c853; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3); }
        .btn-update:hover { background: #00e676; transform: translateY(-2px); }

        #fsBtn {
            background: #4D80F5;
            position: fixed !important;
            bottom: 25px;
            left: 25px;
            z-index: 110;
        }

        .fs-active-style {
            background: rgba(0,0,0,0.5) !important;
            color: #fff !important;
            bottom: 15px !important;
            left: 15px !important;
            padding: 8px 12px !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        @media (max-width: 768px) {
            .tournament-box { width: 200px; left: calc(50% - 100px); font-size: 12px; border-radius: 0 0 20px 20px; }
            #dispRed { top: 60px; left: 10px; }
            #dispBlue { top: 60px; left: auto; right: 10px; }
            .player { width: 130px; font-size: 16px; padding: 8px; border-radius: 10px; }
            .control-panel { flex-direction: column; width: 92%; bottom: 15px; padding: 15px; }
            #inTour, #inRed, #inBlue { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="main-stream" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay-container">
        <div class="tournament-box draggable" id="dispTour">GIẢI ĐẤU CỜ TƯỚNG</div>
        <div class="player red draggable" id="dispRed">TIÊN</div>
        <div class="player blue draggable" id="dispBlue">HẬU</div>
    </div>

    <div class="control-panel" id="panel">
        <input id="inTour" placeholder="Tên Giải Đấu">
        <input id="inRed" placeholder="Tên Bên Đỏ (Tiên)">
        <input id="inBlue" placeholder="Tên Bên Xanh (Hậu)">
        <button class="btn btn-update" onclick="applyInfo()">CẬP NHẬT</button>
    </div>

    <button class="btn" id="fsBtn">FULL</button>

    <script>
        const secureLink = atob("aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9cXVvY2RhbmcmY2xlYW5vdXRwdXQmbm9hdWRpbyZidWZmZXI9MCZidXR0b25zPTA=");
        const iframe = document.getElementById("main-stream");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        const u = new URLSearchParams(window.location.search);
        document.getElementById("dispTour").innerText = u.get("g") || "GIẢI ĐẤU CỜ TƯỚNG";
        document.getElementById("dispRed").innerText = u.get("d") || "TIÊN";
        document.getElementById("dispBlue").innerText = u.get("x") || "HẬU";

        iframe.src = secureLink;

        if (u.get("live") === "1") {
            panel.style.display = "none";
            btnFs.style.display = "none";
        }

        function applyInfo() {
            const tour = document.getElementById("inTour").value.trim() || "GIẢI ĐẤU CỜ TƯỚNG";
            const red = document.getElementById("inRed").value.trim() || "TIÊN";
            const blue = document.getElementById("inBlue").value.trim() || "HẬU";
            document.getElementById("dispTour").innerText = tour;
            document.getElementById("dispRed").innerText = red;
            document.getElementById("dispBlue").innerText = blue;
            const newU = `?g=${encodeURIComponent(tour)}&d=${encodeURIComponent(red)}&x=${encodeURIComponent(blue)}`;
            window.history.pushState({}, '', newU);
        }

        btnFs.addEventListener("click", async () => {
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
                btnFs.innerText = "✕";
                btnFs.classList.add("fs-active-style");
                panel.style.opacity = "0";
                panel.style.visibility = "hidden";
            } else {
                await document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.classList.remove("fs-active-style");
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
        });

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') applyInfo(); });

        // 🛠️ HỆ THỐNG KÉO THẢ CHỐNG DÍNH CHUỘT TUYỆT ĐỐI
        const draggables = document.querySelectorAll('.draggable');
        draggables.forEach(el => {
            let active = false;
            let currentX = 0, currentY = 0, initialX = 0, initialY = 0;

            function dragStart(e) {
                const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
                initialX = clientX - currentX;
                initialY = clientY - currentY;
                if (e.target === el) active = true;
            }

            function dragMove(e) {
                if (!active) return;
                e.preventDefault();
                const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
                currentX = clientX - initialX;
                currentY = clientY - initialY;
                el.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }

            function dragEnd() { active = false; }

            el.addEventListener("mousedown", dragStart, false);
            el.addEventListener("touchstart", dragStart, { passive: false });
            window.addEventListener("mousemove", dragMove, false);
            window.addEventListener("mouseup", dragEnd, false);
            window.addEventListener("touchmove", dragMove, { passive: false });
            window.addEventListener("touchend", dragEnd, false);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
