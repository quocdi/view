<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cờ Tướng</title>

<style>
body {
  margin:0;
  background:black;
  font-family:Arial;
}

/* VIDEO */
iframe {
  position:fixed;
  width:100%;
  height:100%;
  border:none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 20px;
  left: 0;
  width: 100%;
  height: 0;
  z-index: 10;
  pointer-events: none;
}

/* STYLE CHUNG */
.player {
  position: absolute;
  padding: 12px 28px;
  border-radius: 12px;
  color: #fff;
  font-weight: bold;
  font-size: 20px;
  letter-spacing: 1px;
  border: 2px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.6);
}

/* 🔴 */
.red {
  left: 80px;
  background: linear-gradient(135deg, #ff1a1a, #800000);
}

/* 🔵 */
.blue {
  right: 80px;
  background: linear-gradient(135deg, #1a75ff, #002b80);
}

/* PANEL */
.panel {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  z-index:20;
}

input {
  padding:6px;
  border:none;
  border-radius:5px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay">
  <div class="player red" id="name1">Đỏ</div>
  <div class="player blue" id="name2">Xanh</div>
</div>

<!-- VIDEO -->
<iframe src="https://vdo.ninja/?view=quocdang&cleanoutput&noaudio&buffer=0"></iframe>

<!-- PANEL -->
<div class="panel" id="panel">
  <input id="input1" placeholder="Tên đỏ">
  <input id="input2" placeholder="Tên xanh">
  <button onclick="update()">Cập nhật</button>
</div>

<script>
// lấy tên từ URL
const url = new URLSearchParams(window.location.search);

const red = url.get("d") || "Đỏ";
const blue = url.get("x") || "Xanh";

// hiển thị tên
document.getElementById("name1").innerText = red;
document.getElementById("name2").innerText = blue;

// ẩn panel nếu có live=1 HOẶC có tên trong link (OBS)
if (url.get("live") === "1" || url.get("d") || url.get("x")) {
  document.getElementById("panel").style.display = "none";
}

// khi bấm cập nhật → reload link mới
function update() {
  const n1 = document.getElementById("input1").value || "Đỏ";
  const n2 = document.getElementById("input2").value || "Xanh";

  const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}`;
  window.location.search = newURL;
}
</script>

</body>
</html>
