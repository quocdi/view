<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Pro Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Reset cơ bản để tránh tràn màn hình */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        /* KHUNG BỌC IFRAME */
        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: #000;
        }

        /* VIDEO - Full màn hình */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* OVERLAY - CHỨA TÊN PLAYER VÀ GIẢI ĐẤU */
        .overlay {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            z-index: 10;
            pointer-events: none; /* Click xuyên qua video */
            display: flex;
            justify-content: space-between;
            align-items: center; /* Căn cho các thành phần thẳng hàng ngang */
            padding: 0 150px;
        }

        .player {
            min-width: 180px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 28px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .red {
            background: linear-gradient(135deg, rgba(255, 42, 42, 0.9), rgba(122, 0, 0, 0.9));
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), 0 8px 25px rgba(0,0,0,0.6);
        }

        .blue {
            background: linear-gradient(135deg, rgba(42, 123, 255, 0.9), rgba(0, 31, 122, 0.9));
            box-shadow: 0 0 20px rgba(0, 120, 255, 0.4), 0 8px 25px rgba(0,0,0,0.6);
        }

        /* Ô HIỂN THỊ GIẢI ĐẤU Ở CHÍNH GIỮA */
        .tournament {
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.85), rgba(15, 15, 15, 0.85));
            padding: 10px 25px;
            border-radius: 30px; /* Bo tròn kiểu viên thuốc nhìn cho sang */
            font-weight: 700;
            font-size: 20px; /* Chữ nhỏ hơn tên player tí cho cân đối */
            color: #FFD700; /* Màu vàng Gold hoàng gia cực nổi */
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3); /* Viền vàng nhẹ */
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2), 0 5px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Dài quá tự font nhỏ/gọn lại */
        }

        /* PANEL ĐIỀU KHIỂN */
        .panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        input {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus {
            border-color: #00c853;
        }

        /* Ô nhập giải đấu dài hơn chút cho dễ gõ */
        #inputTour {
            width: 220px;
            border-color: #FFD700;
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #00c853;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: #00e676;
            transform: scale(1.05);
        }

        /* NÚT FULL ĐỘC LẬP */
        #fsBtn {
            background: #4D80F5;
            position: fixed !important;
            bottom: 25px;
            left: 24px;
            z-index: 25;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 70px;
            text-align: center;
        }

        .fs-active {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.6) !important;
            bottom: 15px !important;
            left: 15px !important;
            padding: 6px 12px !important;
            font-size: 14px !important;
            min-width: auto !important;
            border-radius: 6px !important;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .overlay {
                padding: 0 20px;
                top: 20px;
            }
            .player {
                min-width: 100px;
                font-size: 14px;
                padding: 6px 12px;
            }
            .tournament {
                font-size: 12px;
                padding: 6px 12px;
                max-width: 150px;
            }
            .panel {
                flex-direction: column;
                width: 85%;
            }
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="tournament" id="tourName">Giải Đấu Live</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div class="panel" id="panel">
        <input id="inputTour" placeholder="Tên Giải Đấu / Trận">
        <input id="input1" placeholder="Tên Đỏ (Tiên)">
        <input id="input2" placeholder="Tên Xanh (Hậu)">
        <button class="btn-action" onclick="updateAllInfo()">Cập nhật ngay</button>
    </div>

    <button class="btn-action" id="fsBtn">FULL</button>

    <script>
        // Lớp 1: Giấu link VDO sang Base64
        const secureToken = atob("aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9cXVvY2RhbmcmY2xlYW5vdXRwdXQmbm9hdWRpbyZidWZmZXI9MCZidXR0b25zPTA=");
        
        const iframe = document.getElementById("stream-iframe");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        // Khởi tạo dữ liệu từ URL (Thêm tham số g cho giải đấu)
        const params = new URLSearchParams(window.location.search);
        const initialTour = params.get("g") || "Giải Đấu Live";
        const initialRed = params.get("d") || "Tiên";
        const initialBlue = params.get("x") || "Hậu";

        const elTour = document.getElementById("tourName");
        const elRed = document.getElementById("name1");
        const elBlue = document.getElementById("name2");

        elTour.innerText = initialTour;
        elRed.innerText = initialRed;
        elBlue.innerText = initialBlue;

        iframe.src = secureToken;

        // Tự ẩn bảng nếu xài link nhúng OBS trực tiếp
        if (params.get("live") === "1" || params.get("d") || params.get("x") || params.get("g")) {
            panel.style.opacity = "0";
            panel.style.visibility = "hidden";
            btnFs.style.display = "none";
        }

        // Hàm cập nhật đồng thời cả Tên Giải đấu + Tên Player
        function updateAllInfo() {
            const t0 = document.getElementById("inputTour").value.trim() || "Giải Đấu Live";
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";

            elTour.innerText = t0;
            elRed.innerText = n1;
            elBlue.innerText = n2;

            // Đẩy tham số lên URL thầm lặng
            const newURL = `?g=${encodeURIComponent(t0)}&d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}`;
            window.history.pushState({}, '', newURL);

            const btnUpdate = document.querySelector('.panel button');
            btnUpdate.innerText = "Đã lưu!";
            btnUpdate.style.background = "#2196F3";
            setTimeout(() => {
                btnUpdate.innerText = "Cập nhật ngay";
                btnUpdate.style.background = "#00c853";
            }, 2000);
        }

        // ĐIỀU KHIỂN FULLSCREEN ẨN SẠCH Ô NHẬP LIỆU
        btnFs.addEventListener("click", async () => {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    btnFs.innerText = "✕"; 
                    btnFs.classList.add("fs-active");
                    panel.style.opacity = "0";
                    panel.style.visibility = "hidden";
                } else {
                    await document.exitFullscreen();
                    btnFs.innerText = "FULL";
                    btnFs.classList.remove("fs-active");
                    panel.style.opacity = "1";
                    panel.style.visibility = "visible";
                }
            } catch(e) {
                console.log("Lỗi fullscreen:", e);
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.classList.remove("fs-active");
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
        });

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { updateAllInfo(); }
        });

        // Lớp 2: Hệ thống pháo đài khóa chặt Chuột phải và F12
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false; // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false; // Ctrl+Shift+J
            if (e.ctrlKey && e.shiftKey && e.keyCode == 67) return false; // Ctrl+Shift+C
            if (e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
            if (e.metaKey && e.altKey && e.keyCode == 73) return false; // Cmd+Opt+I (Mac)
            if (e.metaKey && e.keyCode == 85) return false; // Cmd+U (Mac)
        };
    </script>
</body>
</html>
