<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .footer-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-image: url('https://raw.githubusercontent.com/kydaoquan/view/main/footerok.JPG');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 5;
            pointer-events: none;
        }

     
        .player {
            min-width: 140px;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 20px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .red { background: linear-gradient(135deg, rgba(255, 60, 60, 0.8), rgba(150, 0, 0, 0.8)); }
        .blue { background: linear-gradient(135deg, rgba(60, 150, 255, 0.8), rgba(0, 50, 150, 0.8)); }

       /* CSS cho các ô nhập liệu */
        input, textarea { 
            background: #222; 
            color: white; 
            padding: 12px; 
            border: 1px solid #444; 
            border-radius: 6px; 
            outline: none; 
            width: 100%; 
            font-family: 'Montserrat', sans-serif; /* Thêm font này vào */
            font-size: 14px;
        }
.overlay {
            position: fixed;
            top: 100px; /* Hạ xuống từ 40px xuống 100px để không chạm header */
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
        }

        #tournament-display {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700; /* Màu vàng Gold cũ */
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
            max-width: 80%;
            text-align: center;
            word-wrap: break-word;
            font-family: 'Montserrat', sans-serif;
        }

        #extra-info-display {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700; /* Màu vàng Gold cũ */
            font-size: 20px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
            font-family: 'Montserrat', sans-serif;
        }
        .panel {
            position: fixed;
            bottom: 150px; left: 10px; right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            border: 1px solid #555;
        }

        input, textarea { background: #222; color: white; padding: 12px; border: 1px solid #444; border-radius: 6px; outline: none; width: 100%; }
        .btn-action { padding: 12px; border: none; border-radius: 6px; background: #00c853; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="footer-banner"></div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div id="tournament-display"></div>
    <div id="extra-info-display"></div>

    <div class="panel" id="panel">
        <input id="inputTournament" placeholder="Linh tinh">
        <textarea id="inputExtra" placeholder="Thông tin giải đấu..." style="height:60px;"></textarea>
        <label style="color:white; display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="checkExtra" style="width:auto;"> Hiện thông tin giải đấu
        </label>
        <div style="display: flex; gap: 8px;">
            <input id="input1" placeholder="Tên Đỏ">
            <input id="input2" placeholder="Tên Xanh">
        </div>
        <button class="btn-action" onclick="updateInfo()">Cập nhật thông tin</button>
    </div>

  <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        }
        setInterval(() => { console.clear(); }, 1000);

        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        const iframe = document.getElementById("stream-iframe");
        iframe.src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0`;

        const params = new URLSearchParams(window.location.search);
        
        // 1. Load data ưu tiên từ URL (để share link), nếu không có thì lấy từ LocalStorage
        const getVal = (key, defaultVal) => params.get(key) || localStorage.getItem(key) || defaultVal;

        // Điền dữ liệu vào form
        document.getElementById("inputTournament").value = getVal("t", "");
        document.getElementById("inputExtra").value = getVal("e", "");
        document.getElementById("input1").value = getVal("d", "Tiên");
        document.getElementById("input2").value = getVal("x", "Hậu");
        document.getElementById("checkExtra").checked = (getVal("c", "0") === "1");

        // Cập nhật lên màn hình
        function refreshDisplay() {
            document.getElementById("name1").innerText = document.getElementById("input1").value;
            document.getElementById("name2").innerText = document.getElementById("input2").value;
            document.getElementById("tournament-display").innerText = document.getElementById("inputTournament").value;
            
            const extraDiv = document.getElementById("extra-info-display");
            extraDiv.innerText = document.getElementById("inputExtra").value;
            extraDiv.style.display = (document.getElementById("checkExtra").checked && document.getElementById("inputExtra").value) ? "block" : "none";
        }
        refreshDisplay();

        function updateInfo() {
            const tournament = document.getElementById("inputTournament").value.trim();
            const extra = document.getElementById("inputExtra").value.trim();
            const isChecked = document.getElementById("checkExtra").checked;
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";
            
            // Lưu vào LocalStorage để nhớ vĩnh viễn trên trình duyệt này
            localStorage.setItem("t", tournament);
            localStorage.setItem("e", extra);
            localStorage.setItem("d", n1);
            localStorage.setItem("x", n2);
            localStorage.setItem("c", isChecked ? "1" : "0");
            
            refreshDisplay();
            
            const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}&t=${encodeURIComponent(tournament)}&e=${encodeURIComponent(extra)}&c=${isChecked ? 1 : 0}`;
            window.history.pushState({}, '', newURL);
        }

        if (params.get("panel") !== "1" && (params.get("d") || params.get("x") || params.get("t"))) {
            document.getElementById("panel").style.display = "none";
        }
    </script>
</body>
</html>
