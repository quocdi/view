<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Interactive Drag Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        /* VIDEO NỀN */
        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- HỆ THỐNG OVERLAY KÉO THẢ --- */
        .overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Giữ click xuyên qua nền */
        }

        /* Lệnh cho phép các ô con nhận tương tác chuột để kéo thả */
        .draggable {
            position: absolute !important;
            pointer-events: auto !important; 
            cursor: move !important; /* Biến chuột thành hình mũi tên 4 hướng */
            touch-action: none; /* Chặn cuộn màn hình trên đt khi đang kéo */
        }

        /* BANNER GIẢI ĐẤU (Vị trí mặc định ở giữa sát top) */
        .tournament-box {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(25, 25, 25, 0.95), rgba(5, 5, 5, 0.95));
            padding: 8px 40px;
            border-radius: 0 0 15px 15px;
            border: 1.5px solid rgba(255, 215, 0, 0.6);
            border-top: none;
            color: #FFD700;
            font-weight: 800;
            font-size: calc(12px + 0.6vw); 
            max-width: 45vw; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-word; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }

        /* Vị trí mặc định ban đầu của ô Đỏ (Tiên) */
        #dispRed {
            top: 65px;
            left: 80px;
        }

        /* Vị trí mặc định ban đầu của ô Xanh (Hậu) */
        #dispBlue {
            top: 65px;
            right: 80px;
        }

        .player {
            min-width: 200px;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 26px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .red { background: linear-gradient(135deg, #cc0000, #660000); }
        .blue { background: linear-gradient(135deg, #0044cc, #002266); }

        /* --- BẢNG ĐIỀU KHIỂN --- */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95);
            padding: 15px 25px;
            border-radius: 15px;
            display: flex;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        input {
            background: #252525;
            color: white;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus { border-color: #00c853; }
        #inTour { width: 250px; border-color: #FFD700; }
        #inRed, #inBlue { width: 160px; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-update { background: #00c853; }
        .btn-update:hover { background: #00e676; transform: scale(1.05); }

        #fsBtn {
            background: #4D80F5;
            position: fixed !important;
            bottom: 25px;
            left: 25px;
            z-index: 110;
        }

        .fs-active-style {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #aaa !important;
            bottom: 10px !important;
            left: 10px !important;
            padding: 5px 10px !important;
            font-size: 12px !important;
        }

        /* Mobile */
        @media (max-width: 768px) {
            #dispRed { top: 50px; left: 15px; right: auto; }
            #dispBlue { top: 50px; right: 15px; left: auto; }
            .player { 
                min-width: 28vw; 
                font-size: 14px; 
                padding: 6px 10px; 
                border-radius: 6px;
            }
            .tournament-box { font-size: 11px; padding: 4px 15px; max-width: 55vw; border-radius: 0 0 10px 10px; }
            .control-panel { flex-direction: column; width: 90%; bottom: 10px; padding: 10px; }
            #inTour, #inRed, #inBlue { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="main-stream" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay-container">
        <div class="tournament-box draggable" id="dispTour">GIẢI ĐẤU CỜ TƯỚNG</div>
        <div class="player red draggable" id="dispRed">TIÊN</div>
        <div class="player blue draggable" id="dispBlue">HẬU</div>
    </div>

    <div class="control-panel" id="panel">
        <input id="inTour" placeholder="Tên Giải Đấu">
        <input id="inRed" placeholder="Tên Bên Đỏ (Tiên)">
        <input id="inBlue" placeholder="Tên Bên Xanh (Hậu)">
        <button class="btn btn-update" onclick="applyInfo()">CẬP NHẬT</button>
    </div>

    <button class="btn" id="fsBtn">FULL</button>

    <script>
        const secureLink = atob("aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9cXVvY2RhbmcmY2xlYW5vdXRwdXQmbm9hdWRpbyZidWZmZXI9MCZidXR0b25zPTA=");
        const iframe = document.getElementById("main-stream");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        const u = new URLSearchParams(window.location.search);
        document.getElementById("dispTour").innerText = u.get("g") || "GIẢI ĐẤU CỜ TƯỚNG";
        document.getElementById("dispRed").innerText = u.get("d") || "TIÊN";
        document.getElementById("dispBlue").innerText = u.get("x") || "HẬU";

        iframe.src = secureLink;

        if (u.get("live") === "1") {
            panel.style.display = "none";
            btnFs.style.display = "none";
        }

        function applyInfo() {
            const tour = document.getElementById("inTour").value.trim() || "GIẢI ĐẤU CỜ TƯỚNG";
            const red = document.getElementById("inRed").value.trim() || "TIÊN";
            const blue = document.getElementById("inBlue").value.trim() || "HẬU";

            document.getElementById("dispTour").innerText = tour;
            document.getElementById("dispRed").innerText = red;
            document.getElementById("dispBlue").innerText = blue;

            const newU = `?g=${encodeURIComponent(tour)}&d=${encodeURIComponent(red)}&x=${encodeURIComponent(blue)}`;
            window.history.pushState({}, '', newU);
        }

        btnFs.addEventListener("click", async () => {
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
                btnFs.innerText = "✕";
                btnFs.classList.add("fs-active-style");
                panel.style.opacity = "0";
                panel.style.visibility = "hidden";
            } else {
                await document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.classList.remove("fs-active-style");
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
        });

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { applyInfo(); }
        });

        // 🛠️ LOGIC KÉO THẢ MƯỢT MÀ CHO CẢ CHUỘT VÀ ĐIỆN THOẠI
        const draggables = document.querySelectorAll('.draggable');

        draggables.forEach(el => {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop
