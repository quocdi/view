<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream </title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .footer-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-image: url('https://raw.githubusercontent.com/kydaoquan/view/main/footerok.JPG');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 5;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 40px;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
        }

        .player {
            min-width: 140px;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 20px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .red { background: linear-gradient(135deg, rgba(255, 60, 60, 0.8), rgba(150, 0, 0, 0.8)); }
        .blue { background: linear-gradient(135deg, rgba(60, 150, 255, 0.8), rgba(0, 50, 150, 0.8)); }

        #tournament-display {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
        }

        .panel {
            position: fixed;
            bottom: 150px; left: 10px; right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            border: 1px solid #555;
        }

        input { background: #222; color: white; padding: 12px; border: 1px solid #444; border-radius: 6px; outline: none; width: 100%; }
        .btn-action { padding: 12px; border: none; border-radius: 6px; background: #00c853; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="footer-banner"></div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div id="tournament-display"></div>

    <div class="panel" id="panel">
        <input id="inputTournament" placeholder="Thông tin giải đấu">
        <div style="display: flex; gap: 8px;">
            <input id="input1" placeholder="Nhập kỳ thủ đi tiên">
            <input id="input2" placeholder="Nhập kỳ thủ đi hậu">
        </div>
        <button class="btn-action" onclick="updateInfo()">Cập nhật thông tin</button>
    </div>

    <script>
        // Khóa DevTools và F12
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        }

        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        const iframe = document.getElementById("stream-iframe");
        iframe.src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0`;

        const params = new URLSearchParams(window.location.search);
        document.getElementById("name1").innerText = params.get("d") || "Tiên";
        document.getElementById("name2").innerText = params.get("x") || "Hậu";
        document.getElementById("tournament-display").innerText = params.get("t") || "";

        function updateInfo() {
            const tournament = document.getElementById("inputTournament").value.trim();
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";
            
            document.getElementById("name1").innerText = n1;
            document.getElementById("name2").innerText = n2;
            document.getElementById("tournament-display").innerText = tournament;
            
            const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}&t=${encodeURIComponent(tournament)}`;
            window.history.pushState({}, '', newURL);
        }

        if (params.get("d") || params.get("x") || params.get("t")) {
            document.getElementById("panel").style.display = "none";
        }
    </script>
</body>
</html>
