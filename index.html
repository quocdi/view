<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Pro Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Reset cơ bản để tránh tràn màn hình */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Không cho cuộn trang */
            width: 100%;
            height: 100vh;
        }

        /* KHUNG BỌC IFRAME ĐỂ ZOOM MƯỢT MÀ */
        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: #000;
        }

        /* VIDEO - Full màn hình */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transition: transform 0.15s ease-out; /* Tạo độ mượt khi gạt zoom */
            transform-origin: center center;
        }

        /* OVERLAY - Chứa tên Player */
        .overlay {
            position: fixed;
            top: 80px; /* Cách top xa hơn xíu cho thoáng */
            left: 0;
            width: 100%;
            z-index: 10;
            pointer-events: none; /* Click xuyên qua để không vướng video */
            display: flex;
            justify-content: space-between;
            padding: 0 150px;
        }

        .player {
            min-width: 180px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 28px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* Phe Đỏ (Tiên) */
        .red {
            background: linear-gradient(135deg, rgba(255, 42, 42, 0.9), rgba(122, 0, 0, 0.9));
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), 0 8px 25px rgba(0,0,0,0.6);
        }

        /* Phe Xanh (Hậu) */
        .blue {
            background: linear-gradient(135deg, rgba(42, 123, 255, 0.9), rgba(0, 31, 122, 0.9));
            box-shadow: 0 0 20px rgba(0, 120, 255, 0.4), 0 8px 25px rgba(0,0,0,0.6);
        }

        /* PANEL ĐIỀU KHIỂN */
        .panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease, visibility 0.3s ease; /* Thêm hiệu ứng ẩn mượt */
        }

        input {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
        }

        input:focus {
            border-color: #00c853;
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #00c853;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: #00e676;
            transform: scale(1.05);
        }

        /* Nút FULL nổi hẳn ra độc lập khi ẩn panel */
        #fsBtn {
            background: #4D80F5;
            position: relative;
            z-index: 25;
        }

        /* Style riêng khi nút FULL bị tách ra đứng một mình góc dưới màn hình */
        .fs-isolated {
            position: fixed !important;
            bottom: 25px;
            left: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- THANH ĐIỀU KHIỂN ZOOM DỌC --- */
        #zoom-control-box {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .zoom-btn {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .zoom-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            transform: rotate(-90deg);
            margin: 45px 0;
            outline: none;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4D80F5;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(77, 128, 245, 0.8);
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .overlay {
                padding: 0 20px;
                top: 20px;
            }
            .player {
                min-width: 120px;
                font-size: 16px;
                padding: 8px 15px;
            }
            .panel {
                flex-direction: column;
                width: 85%;
            }
            #zoom-control-box {
                right: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div class="panel" id="panel">
        <input id="input1" placeholder="Tên Đỏ (Tiên)">
        <input id="input2" placeholder="Tên Xanh (Hậu)">
        <button class="btn-action" onclick="updateNames()">Cập nhật ngay</button>
    </div>

    <button class="btn-action fs-isolated" id="fsBtn">FULL</button>

    <div id="zoom-control-box">
        <button class="zoom-btn" onclick="changeZoomBtn(1)">+</button>
        <input type="range" id="zoom-slider" class="zoom-slider" min="100" max="300" step="5" value="100" oninput="applyHybridZoom(this.value)">
        <button class="zoom-btn" onclick="changeZoomBtn(-1)">-</button>
    </div>

    <script>
        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        const iframe = document.getElementById("stream-iframe");
        const zoomBox = document.getElementById("zoom-control-box");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        // Khởi tạo dữ liệu từ URL
        const params = new URLSearchParams(window.location.search);
        const initialRed = params.get("d") || "Tiên";
        const initialBlue = params.get("x") || "Hậu";

        const elRed = document.getElementById("name1");
        const elBlue = document.getElementById("name2");

        elRed.innerText = initialRed;
        elBlue.innerText = initialBlue;

        // Nạp link luồng
        iframe.src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0&zoom&control&buttons=0`;

        // Ẩn bảng điều khiển vĩnh viễn nếu chạy link OBS nhúng trực tiếp
        if (params.get("live") === "1" || params.get("d") || params.get("x")) {
            panel.style.opacity = "0";
            panel.style.visibility = "hidden";
            btnFs.style.display = "none"; // OBS Source thì không cần nút Full
            zoomBox.style.display = "flex";
        } else {
            zoomBox.style.display = "flex";
        }

        function updateNames() {
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";

            elRed.innerText = n1;
            elBlue.innerText = n2;

            const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}`;
            window.history.pushState({}, '', newURL);

            const btnUpdate = document.querySelector('.panel button');
            btnUpdate.innerText = "Đã lưu!";
            btnUpdate.style.background = "#2196F3";
            setTimeout(() => {
                btnUpdate.innerText = "Cập nhật ngay";
                btnUpdate.style.background = "#00c853";
            }, 2000);
        }

        // ĐIỀU KHIỂN ZOOM HYBRID
        function applyHybridZoom(inputValue) {
            const zoomRatio = parseFloat(inputValue) / 100;
            iframe.style.transform = `scale(${zoomRatio})`;
            try {
                iframe.contentWindow.postMessage({ "zoom": parseInt(inputValue) }, '*');
            } catch (e) {
                console.log("Lỗi lệnh zoom:", e);
            }
        }

        function changeZoomBtn(direction) {
            const slider = document.getElementById('zoom-slider');
            let newValue = parseInt(slider.value) + (direction * 20);
            if (newValue < 100) newValue = 100;
            if (newValue > 300) newValue = 300;
            slider.value = newValue;
            applyHybridZoom(newValue);
        }

        // 🔥 LOGIC MỚI: Bấm FULL là giấu sạch ô nhập liệu
        btnFs.addEventListener("click", async () => {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    btnFs.innerText = "EXIT";
                    btnFs.style.background = "#f44336";
                    
                    // Ẩn mượt mà bảng nhập liệu đi
                    panel.style.opacity = "0";
                    panel.style.visibility = "hidden";
                } else {
                    await document.exitFullscreen();
                    btnFs.innerText = "FULL";
                    btnFs.style.background = "#4D80F5";
                    
                    // Hiện lại bảng nhập liệu khi thoát toàn màn hình
                    panel.style.opacity = "1";
                    panel.style.visibility = "visible";
                }
            } catch(e) {
                console.log("Lỗi kích hoạt toàn màn hình:", e);
            }
        });

        // Lắng nghe sự kiện nếu người dùng bấm nút Esc hoặc vuốt màn hình để thoát Fullscreen tự do
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.style.background = "#4D80F5";
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
        });

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { updateNames(); }
        });

        // Bảo mật chặn F12
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
        }
    </script>
</body>
</html>
