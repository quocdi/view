<!DOCTYPE html>
<html lang="vi">
<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cờ Tướng</title>

<style>
body {
  margin:0;
  background:black;
  font-family:'Montserrat', sans-serif;
}

/* VIDEO */
iframe {
  position:fixed;
  width:100%;
  height:100%;
  border:none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 20px;
  left: 0;
  width: 100%;
  height: 0;
  z-index: 10;
  pointer-events: none;

}
.player {
  position: absolute;
  padding: 14px 32px;
  border-radius: 14px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #fff;

  /* nền kính mờ */
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.35);

  /* viền sáng */
  border: 2px solid rgba(255,255,255,0.25);

  /* bóng + nổi */
  box-shadow:
    0 8px 25px rgba(0,0,0,0.8),
    inset 0 0 10px rgba(255,255,255,0.1);

  /* glow chữ */
  text-shadow:
    0 0 5px rgba(0,0,0,0.8),
    0 0 10px rgba(0,0,0,0.6);
}

/* 🔴 BÊN TRÁI */
.red {
  left: 80px;

  background: linear-gradient(135deg, #ff2a2a, #7a0000);

  box-shadow:
    0 0 15px rgba(255,0,0,0.6),
    0 8px 25px rgba(0,0,0,0.8);
}

/* 🔵 BÊN PHẢI */
.blue {
  right: 80px;

  background: linear-gradient(135deg, #2a7bff, #001f7a);

  box-shadow:
    0 0 15px rgba(0,120,255,0.6),
    0 8px 25px rgba(0,0,0,0.8);
}

/* PANEL */
.panel {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  z-index:20;
}

input {
  padding:6px;
  border:none;
  border-radius:5px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay">
  <div class="player red" id="name1">Đỏ</div>
  <div class="player blue" id="name2">Xanh</div>
</div>

<!-- VIDEO -->
<iframe src="https://vdo.ninja/?view=quocdang&cleanoutput&noaudio&buffer=0"></iframe>

<!-- PANEL -->
<div class="panel" id="panel">
  <input id="input1" placeholder="Tên đỏ">
  <input id="input2" placeholder="Tên xanh">
  <button onclick="update()">Cập nhật</button>
</div>

<script>
// lấy tên từ URL
const url = new URLSearchParams(window.location.search);

const red = url.get("d") || "Đỏ";
const blue = url.get("x") || "Xanh";

// hiển thị tên
document.getElementById("name1").innerText = red;
document.getElementById("name2").innerText = blue;

// ẩn panel nếu có live=1 HOẶC có tên trong link (OBS)
if (url.get("live") === "1" || url.get("d") || url.get("x")) {
  document.getElementById("panel").style.display = "none";
}

// khi bấm cập nhật → reload link mới
function update() {
  const n1 = document.getElementById("input1").value || "Đỏ";
  const n2 = document.getElementById("input2").value || "Xanh";

  const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}`;
  window.location.search = newURL;
}
</script>

</body>
</html>
