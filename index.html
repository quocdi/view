<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Drag & Resize Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Hộp chứa bọc ngoài để hỗ trợ vừa Kéo vừa Zoom */
        .wrapper-box {
            position: absolute !important;
            pointer-events: auto !important;
            touch-action: none;
            will-change: transform;
            padding: 0;
            display: inline-block;
        }

        /* Ô GIẢI ĐẤU PHÁT TRIỂN CHUẨN */
        .tournament-box {
            width: 350px;
            height: 50px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.95) 0%, rgba(10, 10, 10, 0.98) 100%);
            border-radius: 20px; 
            border: 2px solid #D4AF37; 
            color: #FFD700;
            font-weight: 800;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-word; 
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            cursor: move;
            width: 100%;
            height: 100%;
            padding: 5px 20px;
        }

        /* Ô PLAYER ĐỎ / XANH */
        .player {
            width: 220px;
            height: 60px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 26px;
            color: #fff;
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: move;
            width: 100%;
            height: 100%;
            padding: 0 15px;
            overflow: hidden;
        }

        .red { background: linear-gradient(135deg, #e60000 0%, #800000 100%); }
        .blue { background: linear-gradient(135deg, #0055ff 0%, #002266 100%); }

        /* 🔥 NÚT KÉO ZOOM Ở GÓC DƯỚI BÊN PHẢI */
        .resizer {
            width: 14px;
            height: 14px;
            background: #fff;
            border: 2px solid #333;
            border-radius: 50%;
            position: absolute;
            right: -4px;
            bottom: -4px;
            cursor: nwse-resize; /* Trỏ chuột chéo góc */
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .tournament-box + .resizer {
            background: #FFD700; /* Nút zoom của giải đấu màu vàng cho đẹp */
        }

        /* VỊ TRÍ MẶC ĐỊNH PC */
        #wrapTour { top: 10px; left: calc(50% - 175px); width: 350px; height: 50px; }
        #wrapRed { top: 75px; left: 80px; width: 220px; height: 60px; }
        #wrapBlue { top: 75px; right: 80px; width: 220px; height: 60px; }

        /* PANEL ĐIỀU KHIỂN */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98);
            padding: 18px 30px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        input {
            background: #1a1a1a;
            color: white;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 10px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus { border-color: #00c853; background: #222; }
        #inTour { width: 280px; border-color: #D4AF37; }
        #inRed, #inBlue { width: 160px; }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            text-transform: uppercase;
        }

        .btn-update { background: #00c853; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3); }
        .btn-update:hover { background: #00e676; transform: translateY(-2px); }

        #fsBtn {
            background: #4D80F5;
            position: fixed !important;
            bottom: 25px;
            left: 25px;
            z-index: 110;
        }

        .fs-active-style {
            background: rgba(0,0,0,0.5) !important;
            color: #fff !important;
            bottom: 15px !important;
            left: 15px !important;
            padding: 8px 12px !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        /* MOBILE CĂN CHỈNH BAN ĐẦU GỌN GÀNG */
        @media (max-width: 768px) {
            #wrapTour { width: 180px; height: 32px; left: calc(50% - 90px); top: 5px; }
            #wrapRed { top: 45px; left: 10px; width: 110px; height: 35px; }
            #wrapBlue { top: 45px; right: 10px; left: auto; width: 110px; height: 35px; }
            .tournament-box { font-size: 11px; border-radius: 10px; }
            .player { font-size: 14px; border-radius: 6px; }
            .control-panel { flex-direction: column; width: 92%; bottom: 15px; padding: 15px; }
            #inTour, #inRed, #inBlue { width: 100%; }
            .resizer { width: 16px; height: 16px; right: -6px; bottom: -6px; } /* Đt làm nút to xíu dễ chạm ngón tay */
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="main-stream" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay-container">
        <div class="wrapper-box" id="wrapTour">
            <div class="tournament-box" id="dispTour">GIẢI ĐẤU CỜ TƯỚNG</div>
            <div class="resizer"></div>
        </div>
        
        <div class="wrapper-box" id="wrapRed">
            <div class="player red" id="dispRed">TIÊN</div>
            <div class="resizer"></div>
        </div>
        
        <div class="wrapper-box" id="wrapBlue">
            <div class="player blue" id="dispBlue">HẬU</div>
            <div class="resizer"></div>
        </div>
    </div>

    <div class="control-panel" id="panel">
        <input id="inTour" placeholder="Tên Giải Đấu">
        <input id="inRed" placeholder="Tên Bên Đỏ (Tiên)">
        <input id="inBlue" placeholder="Tên Bên Xanh (Hậu)">
        <button class="btn btn-update" onclick="applyInfo()">CẬP NHẬT</button>
    </div>

    <button class="btn" id="fsBtn">FULL</button>

    <script>
        const secureLink = atob("aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9cXVvY2RhbmcmY2xlYW5vdXRwdXQmbm9hdWRpbyZidWZmZXI9MCZidXR0b25zPTA=");
        const iframe = document.getElementById("main-stream");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        const u = new URLSearchParams(window.location.search);
        document.getElementById("dispTour").innerText = u.get("g") || "GIẢI ĐẤU CỜ TƯỚNG";
        document.getElementById("dispRed").innerText = u.get("d") || "TIÊN";
        document.getElementById("dispBlue").innerText = u.get("x") || "HẬU";

        iframe.src = secureLink;

        if (u.get("live") === "1") {
            panel.style.display = "none";
            btnFs.style.display = "none";
        }

        // TỰ ĐỘNG KHỚP CHỮ THEO CHIỀU CAO/CHIỀU RỘNG Ô KHI ĐỔI KÍCH THƯỚC
        function autoFitText(box) {
            const innerTextNode = box.querySelector('.player, .tournament-box');
            if(!innerTextNode) return;

            let baseSize = innerTextNode.classList.contains('tournament-box') ? 17 : 26;
            
            // Tính toán tỷ lệ font chữ dựa theo chiều cao hiện tại của ô sau khi bị kéo zoom
            let currentHeight = box.clientHeight;
            let calculatedFont = Math.floor(currentHeight * 0.45); // Font chữ bằng 45% chiều cao ô
            
            innerTextNode.style.fontSize = calculatedFont + "px";

            // Nếu chữ dài quá tràn viền ngang thì bóp nhỏ tiếp
            while (innerTextNode.scrollWidth > box.clientWidth && calculatedFont > 8) {
                calculatedFont--;
                innerTextNode.style.fontSize = calculatedFont + "px";
            }
        }

        function adjustAll() {
            document.querySelectorAll('.wrapper-box').forEach(box => autoFitText(box));
        }

        function applyInfo() {
            document.getElementById("dispTour").innerText = document.getElementById("inTour").value.trim() || "GIẢI ĐẤU CỜ TƯỚNG";
            document.getElementById("dispRed").innerText = document.getElementById("inRed").value.trim() || "TIÊN";
            document.getElementById("dispBlue").innerText = document.getElementById("inBlue").value.trim() || "HẬU";
            adjustAll();
            const newU = `?g=${encodeURIComponent(document.getElementById("dispTour").innerText)}&d=${encodeURIComponent(document.getElementById("dispRed").innerText)}&x=${encodeURIComponent(document.getElementById("dispBlue").innerText)}`;
            window.history.pushState({}, '', newU);
        }

        window.addEventListener('load', () => { setTimeout(adjustAll, 200); });
        window.addEventListener('resize', adjustAll);

        btnFs.addEventListener("click", async () => {
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
                btnFs.innerText = "✕";
                btnFs.classList.add("fs-active-style");
                panel.style.opacity = "0";
                panel.style.visibility = "hidden";
            } else {
                await document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.classList.remove("fs-active-style");
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
            setTimeout(adjustAll, 150);
        });

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') applyInfo(); });

        // 🛠️ HỆ THỐNG PHỨC HỢP: VỪA KÉO DI CHUYỂN - VỪA ZOOM TO NHỎ
        const boxes = document.querySelectorAll('.wrapper-box');

        boxes.forEach(box => {
            let isDragging = false;
            let isResizing = false;
            
            let startX, startY;
            let initialLeft, initialTop;
            let initialWidth, initialHeight;
            
            const resizer = box.querySelector('.resizer');

            // --- HÀM BẮT ĐẦU (CHUỘT & CẢM ỨNG) ---
            const onStart = (e) => {
                const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
                
                startX = clientX;
                startY = clientY;
                
                // Thu thập vị trí thực tế để không bị nhảy tọa độ khi đổi hệ thống
                const rect = box.getBoundingClientRect();
                box.style.left = rect.left + 'px';
                box.style.top = rect.top + 'px';
                box.style.right = 'auto'; // Hủy ghim lề phải để tự do co bóp

                initialLeft = rect.left;
                initialTop = rect.top;
                initialWidth = rect.width;
                initialHeight = rect.height;

                if (e.target === resizer) {
                    isResizing = true;
                    isDragging = false;
                } else {
                    isDragging = true;
                    isResizing = false;
                }
            };

            // --- HÀM DI CHUYỂN VÀ BIẾN ĐỔI KÍCH THƯỚC ---
            const onMove = (e) => {
                if (!isDragging && !isResizing) return;
                e.preventDefault();

                const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;

                const dx = clientX - startX;
                const dy = clientY - startY;

                if (isDragging) {
                    // Logic di chuyển vị trí ô
                    box.style.left = (initialLeft + dx) + 'px';
                    box.style.top = (initialTop + dy) + 'px';
                } else if (isResizing) {
                    // Logic bóp méo, co giãn, phóng to thu nhỏ ô
                    const newW = Math.max(70, initialWidth + dx); // Không cho thu nhỏ quá 70px
                    const newHeight = Math.max(25, initialHeight + dy); // Không cho thu nhỏ chiều cao quá 25px
                    
                    box.style.width = newW + 'px';
                    box.style.height = newHeight + 'px';
                    
                    autoFitText(box); // Ép font chữ chạy theo kích thước mới
                }
            };

            // --- HÀM KẾT THÚC ---
            const onEnd = () => {
                isDragging = false;
                isResizing = false;
            };

            // Gắn sự kiện cho PC chuột
            box.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);

            // Gắn sự kiện cho Điện thoại ngón tay
            box.addEventListener('touchstart', onStart, { passive: false });
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
