<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* FOOTER BANNER - Kéo dài hết chiều rộng */
        .footer-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Độ cao tùy chỉnh theo ảnh của mày */
            background-image: url('URL_ANH_CUA_MAY_O_DAY'); /* Thay URL ảnh của mày vào đây */
            background-size: cover;
            background-position: center;
            z-index: 5;
            opacity: 0.9;
        }

        /* OVERLAY TÊN PLAYER */
        .overlay {
            position: fixed;
            top: 40px;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
        }

        .player {
            min-width: 140px;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .red { background: linear-gradient(135deg, rgba(255, 60, 60, 0.8), rgba(150, 0, 0, 0.8)); }
        .blue { background: linear-gradient(135deg, rgba(60, 150, 255, 0.8), rgba(0, 50, 150, 0.8)); }

        /* TÊN GIẢI ĐẤU - Vàng nhẹ */
        #tournament-display {
            position: fixed;
            bottom: 80px; /* Nâng cao lên một chút so với cũ để không đè lên footer */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
        }

        .panel {
            position: fixed;
            bottom: 120px; left: 10px; right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            border: 1px solid #555;
        }

        input { background: #222; color: white; padding: 12px; border: 1px solid #444; border-radius: 6px; outline: none; width: 100%; }
        .btn-action { padding: 12px; border: none; border-radius: 6px; background: #00c853; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="https://i.postimg.cc/3Nm0J7Xc/footerok.jpg" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <!-- Banner chân trang -->
    <div class="footer-banner"></div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div id="tournament-display"></div>

    <div class="panel" id="panel">
        <input id="inputTournament" placeholder="Tên giải đấu">
        <div style="display: flex; gap: 8px;">
            <input id="input1" placeholder="Tên Đỏ">
            <input id="input2" placeholder="Tên Xanh">
        </div>
        <button class="btn-action" onclick="updateInfo()">Cập nhật thông tin</button>
    </div>

    <script>
        // ... giữ nguyên code JavaScript cũ ...
        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        const iframe = document.getElementById("stream-iframe");
        iframe.src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0`;

        const params = new URLSearchParams(window.location.search);
        document.getElementById("name1").innerText = params.get("d") || "Tiên";
        document.getElementById("name2").innerText = params.get("x") || "Hậu";
        document.getElementById("tournament-display").innerText = params.get("t") || "";

        function updateInfo() {
            const tournament = document.getElementById("inputTournament").value.trim();
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";
            
            document.getElementById("name1").innerText = n1;
            document.getElementById("name2").innerText = n2;
            document.getElementById("tournament-display").innerText = tournament;
            
            const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}&t=${encodeURIComponent(tournament)}`;
            window.history.pushState({}, '', newURL);
        }

        if (params.get("d") || params.get("x") || params.get("t")) {
            document.getElementById("panel").style.display = "none";
        }
    </script>
</body>
</html>
